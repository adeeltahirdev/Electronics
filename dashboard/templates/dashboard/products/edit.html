{% extends "dashboard/base.html" %}
{% load static %}

{% block dashboard_title %}Edit Product{% endblock %}

{% block dashboard_content %}
<div class="card">
    <div class="card-header">
        <h3>Edit Product: {{ product.name }}</h3>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" name="price" value="{{ product.price }}" step="0.01" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" value="{{ product.stock }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="5" class="form-control">{{ product.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Current Image</label>
                {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}" style="max-width: 200px; display: block; margin-bottom: 10px;">
                {% endif %}
                <input type="file" name="image" class="form-control" accept="image/*">
                <small>Leave empty to keep current image</small>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Product</button>
                <a href="{% url 'dashboard_products' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
