{% extends "base.html" %}
{% load static %}

{% block title %}All Products – Vision Electronics{% endblock %}

{% block extra_head %}
  <!-- Pass Django data to JavaScript safely -->
  <script>
    const PRODUCTS_DATA = {{ products_json|safe }};
    console.log("PRODUCTS_DATA loaded from Django:", PRODUCTS_DATA);
    console.log("Number of products:", PRODUCTS_DATA ? PRODUCTS_DATA.length : 0);
  </script>
{% endblock %}

{% block content %}

  <!-- ===== ALL PRODUCTS PAGE ===== -->
  <section class="all-products container">

    <div class="products-top-bar">
      <h2>Shop</h2>
      <select id="sortBy">
        <option value="default">Sort by</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
        <option value="name-desc">Name: Z–A</option>
      </select>
    </div>

    <!-- Products Grid – populated by JS using PRODUCTS_DATA -->
    <div class="products-grid" id="productsGrid"></div>

    <!-- Pagination – populated by JS -->
    <div class="pagination" id="pagination"></div>

  </section>

{% endblock %}

{% block extra_scripts %}
<script>
  // Function to update cart counter
  function updateCartCounter() {
    const cart = JSON.parse(localStorage.getItem("me_cart") || "[]");
    const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
    const cartCounter = document.getElementById("cartCount");
    if (cartCounter) {
      cartCounter.textContent = totalItems;
      // Show/hide counter based on value
      if (totalItems > 0) {
        cartCounter.style.display = "inline-block";
      } else {
        cartCounter.style.display = "none";
      }
    }
    return totalItems;
  }

  // Show temporary notification
  function showNotification(message) {
    const notification = document.createElement('div');
    notification.textContent = message;
    notification.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      background: #4CAF50;
      color: white;
      padding: 12px 20px;
      border-radius: 5px;
      z-index: 9999;
      animation: fadeOut 2s ease-out;
    `;
    document.body.appendChild(notification);
    setTimeout(() => {
      notification.style.opacity = '0';
      setTimeout(() => notification.remove(), 300);
    }, 2000);
  }

  // ── All Products: sorting, filtering, pagination ──────────────────────────
  document.addEventListener("DOMContentLoaded", function () {
    // Update cart counter on page load
    updateCartCounter();
    
    // Check if PRODUCTS_DATA exists
    if (typeof PRODUCTS_DATA === 'undefined') {
      console.error("PRODUCTS_DATA is not defined! Check if products_json is being passed from Django.");
      const grid = document.getElementById("productsGrid");
      if (grid) {
        grid.innerHTML = '<p class="no-products">Error loading products. Please refresh the page.</p>';
      }
      return;
    }
    
    if (!PRODUCTS_DATA || PRODUCTS_DATA.length === 0) {
      console.warn("PRODUCTS_DATA is empty!");
      const grid = document.getElementById("productsGrid");
      if (grid) {
        grid.innerHTML = '<p class="no-products">No products found.</p>';
      }
      return;
    }
    
    console.log("PRODUCTS_DATA loaded:", PRODUCTS_DATA.length, "products");
    console.log("First product sample:", PRODUCTS_DATA[0]);
    
    const PRODUCTS_PER_PAGE = 16;
    let currentPage = 1;
    let filteredProducts = [...PRODUCTS_DATA];

    // Read ?search= and ?category= query params
    const params   = new URLSearchParams(window.location.search);
    const searchQ  = (params.get("search")   || "").toLowerCase();
    const catSlug  = (params.get("category") || "").toLowerCase();

    if (searchQ) {
      filteredProducts = filteredProducts.filter(p =>
        p.name.toLowerCase().includes(searchQ)
      );
      console.log("Filtered by search:", searchQ, "->", filteredProducts.length, "products");
    }
    if (catSlug) {
      filteredProducts = filteredProducts.filter(p =>
        p.categories && p.categories.some(c => c.toLowerCase().replace(/\s+/g, "-") === catSlug)
      );
      console.log("Filtered by category:", catSlug, "->", filteredProducts.length, "products");
    }

    function sortProducts(arr, mode) {
      const sorted = [...arr];
      switch (mode) {
        case "price-low":  sorted.sort((a, b) => a.price - b.price); break;
        case "price-high": sorted.sort((a, b) => b.price - a.price); break;
        case "name-asc":   sorted.sort((a, b) => a.name.localeCompare(b.name)); break;
        case "name-desc":  sorted.sort((a, b) => b.name.localeCompare(a.name)); break;
      }
      return sorted;
    }

    function renderProducts(products, page) {
      const grid  = document.getElementById("productsGrid");
      const start = (page - 1) * PRODUCTS_PER_PAGE;
      const slice = products.slice(start, start + PRODUCTS_PER_PAGE);

      if (!slice.length) {
        grid.innerHTML = '<p class="no-products">No products found.</p>';
        return;
      }

      grid.innerHTML = slice.map(p => `
        <div class="product-card"
             data-id="${p.id}"
             data-name="${escapeHtml(p.name)}"
             data-price="${p.price}"
             data-img="${p.img}">
          <a href="${p.url}">
            <ion-icon name="heart-circle-outline" class="wishlist-btn"></ion-icon>
            <img src="${p.img || '/static/img/placeholder.webp'}" alt="${escapeHtml(p.name)}" loading="lazy" />
            <h3>${escapeHtml(p.name)}</h3>
            <p class="price">Rs ${Number(p.price).toLocaleString("en-PK")}</p>
          </a>
          <button class="add-cart-btn"
                  data-id="${p.id}"
                  data-name="${escapeHtml(p.name)}"
                  data-price="${p.price}"
                  data-img="${p.img || '/static/img/placeholder.webp'}">
            Add to Cart
          </button>
        </div>
      `).join("");
      
      // Attach event listeners to "Add to Cart" buttons
      document.querySelectorAll('.add-cart-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          
          const product = {
            id: parseInt(this.dataset.id),
            name: this.dataset.name,
            price: parseFloat(this.dataset.price),
            img: this.dataset.img
          };
          
          console.log("Add to cart clicked:", product);
          
          // Store in localStorage directly
          let cart = JSON.parse(localStorage.getItem("me_cart") || "[]");
          const existingItem = cart.find(item => item.id === product.id);
          if (existingItem) {
            existingItem.qty += 1;
          } else {
            cart.push({...product, qty: 1});
          }
          localStorage.setItem("me_cart", JSON.stringify(cart));
          
          // Update cart counter immediately
          updateCartCounter();
          
          // Show notification
          showNotification(`${product.name} added to cart!`);
        });
      });
    }
    
    // Helper function to escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderPagination(products, page) {
      const total = Math.ceil(products.length / PRODUCTS_PER_PAGE);
      const pag   = document.getElementById("pagination");
      if (total <= 1) { pag.innerHTML = ""; return; }

      let html = "";
      if (page > 1) html += `<button class="page-btn" data-page="${page - 1}">‹ Prev</button>`;
      for (let i = 1; i <= total; i++) {
        html += `<button class="page-btn ${i === page ? "active" : ""}" data-page="${i}">${i}</button>`;
      }
      if (page < total) html += `<button class="page-btn" data-page="${page + 1}">Next ›</button>`;
      pag.innerHTML = html;

      pag.querySelectorAll(".page-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          currentPage = parseInt(btn.dataset.page);
          renderProducts(filteredProducts, currentPage);
          renderPagination(filteredProducts, currentPage);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function refresh() {
      renderProducts(filteredProducts, currentPage);
      renderPagination(filteredProducts, currentPage);
    }

    // Sort dropdown
    const sortSelect = document.getElementById("sortBy");
    if (sortSelect) {
      sortSelect.addEventListener("change", function () {
        filteredProducts = sortProducts(filteredProducts, this.value);
        currentPage = 1;
        refresh();
      });
    }

    // Initial render
    refresh();
  });
</script>
{% endblock %}
